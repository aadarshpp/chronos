<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Engine Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #d4d4d4; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #569cd6; border-bottom: 2px solid #569cd6; padding-bottom: 10px; }
        .container { display: flex; gap: 20px; margin-top: 20px; width: 100%; max-width: 1200px; }
        .panel { background-color: #252526; border: 1px solid #3e3e42; border-radius: 8px; padding: 20px; flex: 1; }
        .panel h2 { margin-top: 0; color: #dcdcaa; font-size: 1.2em; }
        input, button { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #3e3e42; border-radius: 4px; background-color: #3c3c3c; color: #d4d4d4; box-sizing: border-box; }
        button { background-color: #0e639c; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #1177bb; }
        button.danger { background-color: #c14545; }
        button.danger:hover { background-color: #d45050; }
        #output { background-color: #1e1e1e; border: 1px solid #3e3e42; border-radius: 4px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 0.9em; min-height: 300px; white-space: pre-wrap; word-wrap: break-word; overflow-y: auto; }
        .status { color: #4ec9b0; font-size: 0.9em; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <h1>⏱ Project CHRONOS: Time-Series Engine</h1>
    
    <div class="container">
        <!-- INSERT PANEL -->
        <div class="panel">
            <h2>1. Insert Tick</h2>
            <label>Timestamp (ms):</label>
            <input type="text" id="inTs" placeholder="e.g., 1690000000000">
            <label>Price (Decimal):</label>
            <input type="text" id="inPrice" placeholder="e.g., 150.25">
            <button onclick="insertData()">Insert Data</button>
        </div>

        <!-- CONTROL PANEL -->
        <div class="panel" style="flex: 0.5; display: flex; flex-direction: column; justify-content: center;">
            <h2>Engine Control</h2>
            <p class="status" id="engineStatus">Status: Running</p>
            <button class="danger" onclick="closeEngine()">Save & Close File</button>
            <p style="font-size: 0.8em; color: #808080; text-align: center;">Warning: Querying requires a closed file to read the index.</p>
        </div>

        <!-- QUERY PANEL -->
        <div class="panel">
            <h2>3. Query Range</h2>
            <label>Start Timestamp:</label>
            <input type="text" id="qStart" placeholder="e.g., 0">
            <label>End Timestamp:</label>
            <input type="text" id="qEnd" placeholder="e.g., 9999999999999">
            <button onclick="queryData()">Execute Query</button>
        </div>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="container" style="margin-top: 20px;">
        <div class="panel" style="width: 100%;">
            <h2>Console Output</h2>
            <div id="output">Waiting for actions...</div>
        </div>
    </div>

    <script>
        const outputDiv = document.getElementById('output');

        function log(message) {
            outputDiv.innerHTML += message + '\n';
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        async function insertData() {
            const ts = document.getElementById('inTs').value;
            const price = document.getElementById('inPrice').value;
            if(!ts || !price) return alert("Fill in both fields");
            
            log(`[INSERT] Sending -> Time: ${ts}, Price: ${price}`);
            try {
                const res = await fetch(`/insert?time=${ts}&price=${price}`);
                const text = await res.text();
                log(`[SERVER] ${text}`);
            } catch (e) {
                log(`[ERROR] ${e}`);
            }
        }

        async function closeEngine() {
            log(`[SYSTEM] Requesting engine close and index flush...`);
            try {
                const res = await fetch(`/close`);
                const text = await res.text();
                log(`[SERVER] ${text}`);
                document.getElementById('engineStatus').innerText = "Status: File Closed (Safe to Query)";
                document.getElementById('engineStatus').style.color = "#dcdcaa";
            } catch (e) {
                log(`[ERROR] ${e}`);
            }
        }

        async function queryData() {
            const start = document.getElementById('qStart').value;
            const end = document.getElementById('qEnd').value;
            if(!start || !end) return alert("Fill in both fields");

            log(`[QUERY] Fetching range ${start} to ${end}...`);
            try {
                const res = await fetch(`/query?start=${start}&end=${end}`);
                const text = await res.text();
                
                // Try to pretty print JSON
                try {
                    const json = JSON.parse(text);
                    log(`[RESULT] Found ${json.length} records:\n${JSON.stringify(json, null, 2)}`);
                } catch {
                    log(`[RESULT] ${text}`);
                }
            } catch (e) {
                log(`[ERROR] ${e}`);
            }
        }
    </script>
</body>
</html>
